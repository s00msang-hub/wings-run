<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Wings Run Pro</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body { font-family: Arial; text-align:center; padding:20px; }
button { padding:10px; margin:5px; font-size:16px; }
</style>
</head>
<body>

<h2>🏃 Wings Run</h2>

<button onclick="startRun(false)">Run starten</button>
<button onclick="startRun(true)">🚶 Geh-Testmodus</button>
<button onclick="stopRun()">⛔ Stop</button>

<p>Zeit: <span id="time">0:00</span></p>
<p>Distanz: <span id="distance">0</span> km</p>
<p>Catcher Abstand: <span id="gap">-</span></p>

<h3>📊 Verlauf</h3>
<canvas id="chart"></canvas>

<h3>📁 Historie</h3>
<ul id="history"></ul>

<script>
let watchId, startTime, distance=0, lastPos=null;
let catcherDistance=0, catcherStarted=false;
let interval;
let runData=[];
let isTest=false;

function startRun(testMode){
  reset();
  isTest=testMode;
  startTime=Date.now();

  watchId=navigator.geolocation.watchPosition(updatePos);

  interval=setInterval(updateTime,1000);
  setInterval(audioUpdate,300000);

  loadHistory();
}

function stopRun(){
  navigator.geolocation.clearWatch(watchId);
  clearInterval(interval);

  speak("Lauf beendet");

  saveRun();
  drawChart();
}

function reset(){
  distance=0;
  catcherDistance=0;
  catcherStarted=false;
  runData=[];
}

function updatePos(pos){
  const {latitude,longitude}=pos.coords;

  if(lastPos){
    distance+=getDist(lastPos.lat,lastPos.lon,latitude,longitude);
  }

  lastPos={lat:latitude,lon:longitude};
  document.getElementById("distance").innerText=distance.toFixed(2);
}

function updateTime(){
  let elapsed=(Date.now()-startTime)/1000;
  let min=Math.floor(elapsed/60);

  document.getElementById("time").innerText=
    min+":"+Math.floor(elapsed%60).toString().padStart(2,'0');

  announcements(min,elapsed);
  updateCatcher(min,elapsed);

  runData.push({
    time:elapsed/60,
    runner:distance,
    catcher:catcherDistance
  });
}

function announcements(min,sec){
  let checkpoints = isTest ?
    [4,3,2,1,0.5] :
    [30,20,10,5,3,2,1,0.5];

  checkpoints.forEach(t=>{
    if(Math.abs(min - t) < 0.02){
      speak("Catcher Car startet in " + t + (t<1?" Minuten":" Minuten"));
    }
  });
}

function updateCatcher(min,sec){

  let startTimeMin = isTest ? 5 : 30;

  if(min>=startTimeMin && !catcherStarted){
    speak("Catcher Car gestartet");
    catcherStarted=true;
  }

  if(!catcherStarted) return;

  let speed=0;

  if(isTest){
    speed=Math.floor((min-startTimeMin))+1;
  }else{
    if(min<60) speed=14;
    else if(min<90) speed=15;
    else if(min<120) speed=16;
    else if(min<150) speed=17;
    else speed=18;
  }

  catcherDistance+=speed/3600;

  let gap=distance-catcherDistance;
  document.getElementById("gap").innerText=gap.toFixed(2);

  if(gap<=0){
    speak("Eingeholt! Zeit "+document.getElementById("time").innerText);
    stopRun();
  }
}

function audioUpdate(){
  let t=document.getElementById("time").innerText;
  let d=distance.toFixed(2);

  let txt="Zeit "+t+" Distanz "+d;

  if(catcherStarted){
    txt+=" Abstand "+document.getElementById("gap").innerText;
  }

  speak(txt);
}

function speak(text){
  let u=new SpeechSynthesisUtterance(text);
  u.lang="de-DE";
  speechSynthesis.speak(u);
}

function getDist(lat1,lon1,lat2,lon2){
  let R=6371;
  let dLat=(lat2-lat1)*Math.PI/180;
  let dLon=(lon2-lon1)*Math.PI/180;

  let a=Math.sin(dLat/2)**2+
    Math.cos(lat1*Math.PI/180)*
    Math.cos(lat2*Math.PI/180)*
    Math.sin(dLon/2)**2;

  return R*(2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
}

function saveRun(){
  let runs=JSON.parse(localStorage.getItem("runs")||"[]");

  runs.push({
    date:new Date().toLocaleString(),
    dist:distance.toFixed(2),
    time:document.getElementById("time").innerText
  });

  localStorage.setItem("runs",JSON.stringify(runs));
}

function loadHistory(){
  let runs=JSON.parse(localStorage.getItem("runs")||"[]");
  let list=document.getElementById("history");
  list.innerHTML="";

  runs.slice(-5).reverse().forEach(r=>{
    let li=document.createElement("li");
    li.innerText=`${r.date} - ${r.dist} km - ${r.time}`;
    list.appendChild(li);
  });
}

function drawChart(){
  let ctx=document.getElementById("chart");

  new Chart(ctx,{
    type:"line",
    data:{
      labels:runData.map(d=>d.time.toFixed(1)),
      datasets:[
        {label:"Runner",data:runData.map(d=>d.runner)},
        {label:"Catcher",data:runData.map(d=>d.catcher)}
      ]
    }
  });
}

</script>

</body>
</html>
