<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Wings Run Pro</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; text-align:center; padding:10px; }
button { padding:10px; margin:5px; }
#map { height:300px; margin-top:10px; }
</style>
</head>
<body>

<h2>🏃 Wings Run</h2>

<button onclick="startRun(false)">Run starten</button>
<button onclick="startRun(true)">🚶 Geh-Testmodus</button>
<button onclick="stopRun()">⛔ Stop</button>

<p>Zeit: <span id="time">0:00</span></p>
<p>Distanz: <span id="distance">0</span> km</p>
<p>Catcher Abstand: <span id="gap">-</span></p>

<div id="map"></div>

<h3>📊 Verlauf</h3>
<canvas id="chart"></canvas>

<h3>📁 Historie</h3>
<ul id="history"></ul>

<script>
let map, marker, polyline;
let path=[];

let watchId, startTime, distance=0, lastPos=null;
let catcherDistance=0, catcherStarted=false;
let interval, runData=[], isTest=false;

function initMap(lat,lon){
  map=L.map('map').setView([lat,lon],15);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© OpenStreetMap'
  }).addTo(map);

  marker=L.marker([lat,lon]).addTo(map);
  polyline=L.polyline([]).addTo(map);
}

function startRun(testMode){
  reset();
  isTest=testMode;
  startTime=Date.now();

  navigator.geolocation.getCurrentPosition(pos=>{
    initMap(pos.coords.latitude,pos.coords.longitude);
  });

  watchId=navigator.geolocation.watchPosition(updatePos);

  interval=setInterval(updateTime,1000);
  setInterval(audioUpdate,300000);

  loadHistory();
}

function stopRun(){
  navigator.geolocation.clearWatch(watchId);
  clearInterval(interval);
  speak("Lauf beendet");
  saveRun();
  drawChart();
}

function reset(){
  distance=0;
  catcherDistance=0;
  catcherStarted=false;
  runData=[];
  path=[];
}

function updatePos(pos){
  const {latitude,longitude}=pos.coords;

  if(lastPos){
    distance+=getDist(lastPos.lat,lastPos.lon,latitude,longitude);
  }

  lastPos={lat:latitude,lon:longitude};
  document.getElementById("distance").innerText=distance.toFixed(2);

  // MAP UPDATE
  path.push([latitude,longitude]);
  marker.setLatLng([latitude,longitude]);
  polyline.setLatLngs(path);
  map.setView([latitude,longitude]);
}

function updateTime(){
  let elapsed=(Date.now()-startTime)/1000;
  let min=Math.floor(elapsed/60);

  document.getElementById("time").innerText=
    min+":"+Math.floor(elapsed%60).toString().padStart(2,'0');

  announcements(min);
  updateCatcher(min);

  runData.push({
    time:elapsed/60,
    runner:distance,
    catcher:catcherDistance
  });
}

function announcements(min){
  let list=isTest?[4,3,2,1]:[30,20,10,5,3,2,1];

  list.forEach(t=>{
    if(min===t){
      speak("Catcher Car startet in "+t+" Minuten");
    }
  });
}

function updateCatcher(min){
  let start=isTest?5:30;

  if(min>=start && !catcherStarted){
    speak("Catcher Car gestartet");
    catcherStarted=true;
  }

  if(!catcherStarted) return;

  let speed=0;

  if(isTest){
    speed=Math.floor(min-start)+1;
  }else{
    if(min<60) speed=14;
    else if(min<90) speed=15;
    else if(min<120) speed=16;
    else if(min<150) speed=17;
    else speed=18;
  }

  catcherDistance+=speed/3600;

  let gap=distance-catcherDistance;
  document.getElementById("gap").innerText=gap.toFixed(2);

  if(gap<=0){
    speak("Eingeholt!");
    stopRun();
  }
}

function audioUpdate(){
  let txt="Zeit "+document.getElementById("time").innerText+
  " Distanz "+distance.toFixed(2);

  if(catcherStarted){
    txt+=" Abstand "+document.getElementById("gap").innerText;
  }

  speak(txt);
}

function speak(t){
  let u=new SpeechSynthesisUtterance(t);
  u.lang="de-DE";
  speechSynthesis.speak(u);
}

function getDist(lat1,lon1,lat2,lon2){
  let R=6371;
  let dLat=(lat2-lat1)*Math.PI/180;
  let dLon=(lon2-lon1)*Math.PI/180;

  let a=Math.sin(dLat/2)**2+
    Math.cos(lat1*Math.PI/180)*
    Math.cos(lat2*Math.PI/180)*
    Math.sin(dLon/2)**2;

  return R*(2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
}

function saveRun(){
  let runs=JSON.parse(localStorage.getItem("runs")||"[]");

  runs.push({
    date:new Date().toLocaleString(),
    dist:distance.toFixed(2),
    time:document.getElementById("time").innerText
  });

  localStorage.setItem("runs",JSON.stringify(runs));
}

function loadHistory(){
  let runs=JSON.parse(localStorage.getItem("runs")||"[]");
  let list=document.getElementById("history");
  list.innerHTML="";

  runs.slice(-5).reverse().forEach(r=>{
    let li=document.createElement("li");
    li.innerText=`${r.date} - ${r.dist} km - ${r.time}`;
    list.appendChild(li);
  });
}

function drawChart(){
  new Chart(document.getElementById("chart"),{
    type:"line",
    data:{
      labels:runData.map(d=>d.time.toFixed(1)),
      datasets:[
        {label:"Runner",data:runData.map(d=>d.runner)},
        {label:"Catcher",data:runData.map(d=>d.catcher)}
      ]
    }
  });
}
</script>

</body>
</html>
