<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Wings Run Fix</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { font-family: Arial; text-align:center; }
#map { height:300px; margin-top:10px; }
button { padding:10px; margin:5px; }
</style>
</head>
<body>

<h2>🏃 Wings Run</h2>

<button onclick="startRun(false)">Run</button>
<button onclick="startRun(true)">Test</button>
<button onclick="stopRun()">Stop</button>

<p>Zeit: <span id="time">0:00</span></p>
<p>Distanz: <span id="distance">0</span></p>
<p>Gap: <span id="gap">-</span></p>

<div id="map"></div>

<script>
let watchId=null;
let interval=null;

let startTime=0;
let distance=0;
let lastPos=null;

let catcherDistance=0;
let catcherStarted=false;

let announced=new Set();
let isRunning=false;
let isTest=false;

let map, marker, line, path=[];

// MAP sofort initialisieren (Fix!)
map = L.map('map').setView([48.14, 11.58], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
marker = L.marker([48.14, 11.58]).addTo(map);
line = L.polyline([]).addTo(map);

function startRun(test){
  if(isRunning) return;

  isRunning=true;
  isTest=test;

  startTime=Date.now();
  distance=0;
  catcherDistance=0;
  catcherStarted=false;
  announced.clear();
  path=[];

  watchId=navigator.geolocation.watchPosition(updatePos);

  interval=setInterval(tick,1000);
}

function stopRun(){
  if(!isRunning) return;

  isRunning = false;

  // Timer stoppen
  clearInterval(interval);
  interval = null;

  // GPS stoppen
  if(watchId){
    navigator.geolocation.clearWatch(watchId);
    watchId = null;
  }

  speak("Lauf gestoppt");
}

function tick(){
  let elapsed=(Date.now()-startTime)/1000;
  let min=Math.floor(elapsed/60);

  document.getElementById("time").innerText =
    min+":"+Math.floor(elapsed%60).toString().padStart(2,'0');

  handleAnnouncements(min);
  updateCatcher(elapsed);
}

function handleAnnouncements(min){
  let times=isTest?[4,3,2,1]:[30,20,10,5,3,2,1];

  times.forEach(t=>{
    if(min===t && !announced.has(t)){
      speak("Catcher Car startet in "+t+" Minuten");
      announced.add(t);
    }
  });
}

function updateCatcher(sec){
  let start=isTest?300:1800;

  if(sec>=start && !catcherStarted){
    speak("Catcher Car gestartet");
    catcherStarted=true;
  }

  if(!catcherStarted) return;

  let speed=0;
  let min=sec/60;

  if(isTest){
    speed=Math.floor((sec-start)/60)+1;
  }else{
    if(min<60) speed=14;
    else if(min<90) speed=15;
    else if(min<120) speed=16;
    else if(min<150) speed=17;
    else speed=18;
  }

  catcherDistance += speed/3600;

  let gap=distance-catcherDistance;
  document.getElementById("gap").innerText=gap.toFixed(2);

  if(gap<=0){
    speak("Eingeholt!");
    stopRun();
  }
}

function updatePos(pos){
  let {latitude,longitude}=pos.coords;

  if(lastPos){
    distance+=getDist(lastPos.lat,lastPos.lon,latitude,longitude);
  }

  lastPos={lat:latitude,lon:longitude};

  document.getElementById("distance").innerText=distance.toFixed(2);

  path.push([latitude,longitude]);
  marker.setLatLng([latitude,longitude]);
  line.setLatLngs(path);
  map.setView([latitude,longitude]);
}

function speak(t){
  let u=new SpeechSynthesisUtterance(t);
  u.lang="de-DE";
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

function getDist(lat1,lon1,lat2,lon2){
  let R=6371;
  let dLat=(lat2-lat1)*Math.PI/180;
  let dLon=(lon2-lon1)*Math.PI/180;

  let a=Math.sin(dLat/2)**2+
    Math.cos(lat1*Math.PI/180)*
    Math.cos(lat2*Math.PI/180)*
    Math.sin(dLon/2)**2;

  return R*(2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
}
</script>

</body>
</html>
